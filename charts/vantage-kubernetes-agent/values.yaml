# Default values for vantage-kubernetes-agent.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

image:
  repository: "quay.io/vantage-sh/kubernetes-agent"
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

agent:
  # The agent can be deployed as a Deployment instead of StatefulSet but requires persistS3 to be present.
  useDeployment: false
  debug: false
  # logLevel corresponds to https://pkg.go.dev/log/slog#Level
  # Info: 0
  # Debug: -4
  logLevel: "0"
  # Unique identifier for your cluster.
  clusterID: ""
  # Vantage API Token
  token: ""
  # If the Secret is pre-provisioned, can override the secret name and key as needed below. If name is not set a Secret using `token` is provisioned.
  secret:
    name: ""
    key: "token"
  # Comma separated list of node address types to use in priority order when looking up node addresses.
  # Default value works for most clusters but can be tuned if getting node hostname lookup errors.
  # eg: "Hostname,InternalDNS,InternalIP,ExternalDNS,ExternalIP"
  nodeAddressTypes: ""

  # Optional. Comma separated list of allowed annotations to be sent to Vantage. Max 10 annotations. Note that values are truncated after 100 chars.
  allowedAnnotations: ""

  # Optional. Comma separated list of allowed labels to be sent to Vantage. Max 10 labels.
  allowedLabels: ""

  # Optional. Some cluster providers have self signed certificates on the kubelet. If you are seeing TLS errors, you can disable TLS verification here.
  disableKubeTLSverify: false

  # Optional. When enabled, includes the labels of that pod's namespace in the pod metadata.
  collectNamespaceLabels: "false"

  # Optional. When enabled, includes the labels of the volumes mounted to pods.
  collectPVCLabels: "false"

  # Optional. When enabled, includes ArgoCD Rollouts within controller metadata similar to Deployments.
  argocdRollouts: false

  # Optional. URL of an HTTP proxy used for external communications during the periodic report. This includes HTTP requests to the Vantage API and AWS S3. ie. http://example.com:3001
  reportHTTPProxy: ""

  # Optional. Number of seconds between scrapes of the kubelet metrics endpoint. Values are 60, 30, 15, 10, or 5
  pollingInterval: 60

  # Optional. Limit the number of resources returned in the initial lists used to populate informers. 0 can be used to return to the previous behavior of listing all resources.
  listLimit: 5000

  gpu:
    # Optional. Whether the agent should scrape GPU metrics or not. Requires NVIDIA dcgm-exporter to be deployed and configured with DCGM_FI_DEV_FB_USED and DCGM_FI_DEV_FB_TOTAL
    usageMetrics: false
    # Optional. The namespace the GPU exporter is deployed in.
    # Uses agent default if not specified: "gpu-operator"
    exporterNamespace: ""
    # Optional. The service name for the GPU exporter. Used to lookup the endpoints.
    # Uses agent default if not specified: "nvidia-dcgm-exporter"
    exporterServiceName: ""
    # Optional. The port name for the metrics port of the gpu exporter.
    # Uses agent default if not specified: "gpu-metrics"
    exporterPortName: ""
    # Optional. The path the metrics endpoint is available under.
    # Uses agent default if not specified: "/metrics"
    exporterPath: ""

  # Optional. Per-node network cost collection. When enabled, the chart deploys
  # the vantage-network-collector DaemonSet (reads conntrack or eBPF flow data
  # to attribute pod network traffic to billing buckets) and tells the agent to
  # pull per-pod byte summaries from it each report cycle.
  #
  # Requires an agent/collector image that includes the network collector
  # (override image.tag if the chart appVersion predates it).
  #
  # Conntrack source prerequisite: net.netfilter.nf_conntrack_acct=1 on every
  # node. The kernel leaves conntrack byte counters at zero when this is off
  # (the default on many images), so the collector cannot attribute traffic.
  # Enable it cluster-wide before generating traffic; only new connections get
  # counters.
  # See the repo README "Conntrack byte accounting" section for details.
  networkCost:
    # When false (default) no DaemonSet, ConfigMap, collector RBAC, or agent
    # network env vars are rendered.
    enabled: false
    # gRPC port the collector listens on and the agent dials. Single source of
    # truth shared by the DaemonSet containerPort/VANTAGE_ADDR and the agent's
    # VANTAGE_NETWORK_COLLECTOR_PORT.
    port: 9012
    # Flow data source. Use "conntrack" for the kernel netfilter conntrack table
    # or "ebpf" for the collector's own cgroup eBPF accounting program. Use
    # "ebpf" on clusters whose datapath bypasses kernel conntrack.
    source: "conntrack"
    # Host cgroup v2 mount to attach the eBPF accounting programs to. Only used
    # when source is "ebpf"; the chart mounts the host path at this location.
    cgroupRoot: "/sys/fs/cgroup"
    # Optional. Log per-poll eBPF flow/delta counts. Only used when source is
    # "ebpf".
    ebpfDebug: false
    # Optional. Override the collector image. Defaults to the top-level image.*
    # values when left empty.
    image:
      repository: ""
      tag: ""
    # Required (unless existingConfigMap is set). List of VPC/VNet subnet CIDRs
    # with zone/region info, rendered into the vantage-network-subnets ConfigMap.
    # Each entry: { cidr: "10.0.0.0/8", zone: "us-east-1a", region: "us-east-1" }.
    # zone is optional; region is derived from zone when omitted. Include IPv6
    # CIDRs on dual-stack / IPv6 clusters or that traffic falls through to the
    # internet bucket.
    subnets: []
    # Optional. List of CIDR->bucket overrides that win over subnet matches.
    # Each entry: { cidr: "203.0.113.0/24", bucket: "internet" }.
    # bucket is one of: in_zone, in_region, cross_region, internet, unknown.
    overrides: []
    # Optional. Name of a pre-existing ConfigMap holding subnets.yaml. When set,
    # the chart does not render its own ConfigMap and `subnets`/`overrides` are
    # ignored.
    existingConfigMap: ""
    # Optional. Resource requests/limits for the collector container.
    resources: {}
    # Optional. Scheduling controls for the collector DaemonSet. The collector
    # is a DaemonSet meant to run on every node, but Kubernetes will not place
    # it on nodes carrying custom taints unless a matching toleration is set
    # here. Add tolerations for any tainted nodes you want network costs from
    # (or omit them to intentionally skip those nodes).
    tolerations: []
    nodeSelector: {}
    # Optional. Node affinity/anti-affinity rules for the collector DaemonSet.
    affinity: {}

  volumes: []
  volumeMounts: []

  # Optional. Additional environment variables to pass to the agent container.
  # Entries are rendered verbatim and appended after the chart's built-in
  # VANTAGE_* variables, so you can also use `valueFrom` (e.g. secretKeyRef).
  #
  # Useful for configuring AWS credentials on non-EKS clusters when using
  # `persistS3.bucket` - for example, GKE clusters using AWS IAM OIDC
  # federation via a projected ServiceAccount token mounted through
  # `agent.volumes` / `agent.volumeMounts`.
  #
  # Do not redefine any VANTAGE_* variables the chart already renders; doing
  # so will produce a duplicate env entry and fail pod admission.
  extraEnv: []
  #   - name: AWS_ROLE_ARN
  #     value: arn:aws:iam::123456789012:role/vantage-agent-s3
  #   - name: AWS_WEB_IDENTITY_TOKEN_FILE
  #     value: /var/run/secrets/aws-iam/token
  #   - name: AWS_REGION
  #     value: us-east-1

# Specifies the pod DNS configuration.
dnsConfig: {}
#  nameservers:
#    - 1.2.3.4
#  searches:
#    - ns1.svc.cluster-domain.example
#    - my.dns.search.suffix
#  options:
#    - name: ndots
#      value: "1"
#    - name: attempts
#      value: "3"

persist:
  mountPath: "/var/lib/vantage-agent"
  name: "data"
  size: "10Gi"
  storageClassName: "" # Optional, uses default if not set

# Configuration for persisting to S3. The agent will use IAM Roles for Service Accounts to authenticate. This should be setup prior to deploying the agent. See the agent docs for what policy is necessary, https://docs.vantage.sh/kubernetes_agent
persistS3:
  # S3 Bucket Name
  bucket: ""
  # Prefix prepended to the standard '$CLUSTER_ID/filename.json.gz' key the agent uses.
  prefix: ""

service:
  name: report
  type: ClusterIP
  port: 9010

# These limits are set low to support small clusters (<=20nodes) and should be considered minimum values for deploying an agent.
# Estimates for larger clusters are roughly:
# ~1CPU/1000node
# ~5MB/node
# These are estimates and will vary significantly based on pod density per node, label usage, cluster activity, etc.
# Agent should reach an approximate steady state after ~1hour of consistent uptime and can be tuned accordingly.
resources:
  limits:
    cpu: 100m
    memory: 100Mi
  requests:
    cpu: 100m
    memory: 100Mi

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

clusterRole:
  annotations: {}
clusterRoleBinding:
  annotations: {}

appLabels: {}
podLabels: {}
podAnnotations: {}
securityContext: {}
podSecurityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}
# Ref: https://kubernetes.io/docs/tasks/run-application/configure-pdb/
podDisruptionBudget: {}
  # maxUnavailable: 1
  # minAvailable: 1
